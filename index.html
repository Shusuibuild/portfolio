<body>
    <!-- Header -->
    <header class="main-header">
        <div class="header-top">
            <div class="header-nav">
                <a href="#projets" class="header-nav-btn" data-i18n="projetsTitle">Projets</a>
                <a href="#contact" class="header-nav-btn" data-i18n="contactTitle">Contact</a>
            </div>
            <div class="lang-selector">
                <button class="lang-btn active" data-lang="fr" aria-label="Français">FR</button>
                <button class="lang-btn" data-lang="en" aria-label="English">EN</button>
            </div>
        </div>
        <h1 class="main-title">_Shusui</h1>
        <h2 class="main-subtitle" data-i18n="subtitle">Minecraft Builder</h2>
    </header>

    <!-- Gallery Section -->
    <main class="gallery">
        <!-- 1 : Diorama cerisier (vue face) -->
        <div class="photo-row full">
            <div class="photo-item" 
                 data-project="diorama-cerisier"
                 data-project-images='["img/diorama_cerisier/diorama_cerisier_vue_face.png"]'>
                <img src="img/diorama_cerisier/diorama_cerisier_vue_face.png" alt="Diorama cerisier vue face">
            </div>
        </div>

        <!-- 2 : Village japonais + créature marine -->
        <div class="photo-row double">
            <div class="photo-item" 
                 data-project="village-japonais"
                 data-project-images='["img/village_japonais_minecraft.png"]'>
                <img src="img/village_japonais_minecraft.png" alt="Village japonais Minecraft">
            </div>
            <div class="photo-item" 
                 data-project="creature-marine"
                 data-project-images='["img/creature_marine/creature_marine__Shusui_plan_rapproche.png"]'>
                <img src="img/creature_marine/creature_marine__Shusui_plan_rapproche.png" alt="Créature marine plan rapproché">
            </div>
        </div>

        <!-- 3 : Statue samouraï (plan buste) -->
        <div class="photo-row full">
            <div class="photo-item" 
                 data-project="statue-samourai"
                 data-project-images='["img/statue_samourai/statue_samourai_plan_buste.png"]'>
                <img src="img/statue_samourai/statue_samourai_plan_buste.png" alt="Statue samouraï plan buste">
            </div>
        </div>

    </main>

    <!-- Projets Section -->
    <section class="projets" id="projets">
        <div class="projets-container">
            <h2 class="projets-title" data-i18n="projetsTitle">Projets</h2>
            <div class="projets-grid">
                <div class="projet-item" 
                     data-project="diorama-cerisier-projet"
                     data-project-images='["img/diorama_cerisier/diorama_cerisier_vue_face.png","img/diorama_cerisier/diorama_cerisier_vue_ensemble.png","img/diorama_cerisier/diorama_cerisier_gros_plan_statue.png"]'>
                    <img src="img/diorama_cerisier/diorama_cerisier_vue_face.png" alt="Diorama cerisier">
                </div>
                <div class="projet-item" 
                     data-project="statue-samourai-projet"
                     data-project-images='["img/statue_samourai/statue_samourai_plan_buste.png","img/statue_samourai/statue_samourai_vue_entiere.png","img/statue_samourai/statue_samourai_avec_socle.png"]'>
                    <img src="img/statue_samourai/statue_samourai_plan_buste.png" alt="Statue samouraï">
                </div>
            </div>
        </div>
    </section>

    <!-- Contact Section -->
    <section class="contact" id="contact">
        <div class="contact-layout">
            <div class="contact-skin">
                <div class="contact-skin-card">
                    <img src="img/skins/skin_Shusui.png" alt="Skin Minecraft _Shusui" class="contact-skin-image">
                </div>
            </div>
            <div class="contact-container">
                <h2 class="contact-title" data-i18n="contactTitle">Contact</h2>
                <div class="contact-info">
                    <div class="contact-item">
                        <span class="contact-label" data-i18n="discordLabel">Discord</span>
                        <a href="https://discord.gg/lusciana" target="_blank" rel="noopener noreferrer" class="contact-link">shusui6562</a>
                    </div>
                    <div class="contact-item">
                        <span class="contact-label" data-i18n="instagramLabel">Instagram</span>
                        <a href="https://instagram.com/shusui6562" target="_blank" rel="noopener noreferrer" class="contact-link">shusui6562</a>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Project Modal -->
    <div class="modal" id="projectModal">
        <div class="modal-overlay" id="modalOverlay"></div>
        <div class="modal-content">
            <button class="modal-close" id="modalClose" data-i18n-aria="modalClose" aria-label="Fermer">×</button>
            
            <div class="modal-gallery">
                <div class="modal-main-image" id="modalMainImage">
                    <img id="modalCurrentImage" src="" alt="">
                    <button class="modal-nav modal-nav-prev" id="modalPrev" data-i18n-aria="modalPrev" aria-label="Image précédente">‹</button>
                    <button class="modal-nav modal-nav-next" id="modalNext" data-i18n-aria="modalNext" aria-label="Image suivante">›</button>
                    <div class="modal-image-counter" id="modalImageCounter"></div>
                </div>
                
                <div class="modal-thumbnails" id="modalThumbnails"></div>
            </div>
        </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-content">
            <div class="footer-links">
